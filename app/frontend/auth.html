<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortly - Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05060a;
      --text: #f5f5f7;
      --muted: rgba(245, 245, 247, 0.68);
      --line: rgba(255, 255, 255, 0.08);
      --card: rgba(255, 255, 255, 0.04);
      --radius-xl: 32px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.10), transparent 25%),
        linear-gradient(180deg, #05060a 0%, #030407 100%);
    }

    a, button { font: inherit; }

    .container {
      width: min(980px, calc(100% - 40px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: white;
    }

    .brand-icon svg {
      width: 28px;
      height: 28px;
    }

    .back-link {
      padding: 12px 18px;
      border-radius: var(--radius-pill);
      text-decoration: none;
      color: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
    }

    .auth-shell {
      min-height: calc(100vh - 82px);
      display: grid;
      place-items: center;
      padding: 20px 0 40px;
    }

    .auth-card {
      width: min(680px, 100%);
      padding: 34px;
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 18px 60px rgba(0,0,0,0.38);
    }

    .auth-card h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 2.6rem);
      letter-spacing: -0.04em;
    }

    .auth-card p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.6;
      max-width: 520px;
    }

    .provider-list {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    .provider-btn {
      min-height: 88px;
      width: 100%;
      border-radius: var(--radius-pill);
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      cursor: pointer;
    }

    .provider-btn[disabled] {
      opacity: 0.54;
      cursor: not-allowed;
    }

    .provider-main {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .provider-mark {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
      flex: 0 0 auto;
    }

    .provider-btn.provider-yandex .provider-mark {
      background: #fc3f1d;
      border-color: rgba(252, 63, 29, 0.35);
      color: white;
    }

    .provider-copy strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1.08rem;
    }

    .provider-copy small {
      display: block;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .provider-action {
      color: rgba(255,255,255,0.88);
      white-space: nowrap;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .container {
        width: min(100% - 24px, 980px);
      }

      .topbar {
        flex-direction: column;
        gap: 14px;
      }

      .auth-card {
        padding: 24px;
      }

      .provider-btn {
        min-height: auto;
        padding: 18px;
        align-items: flex-start;
        flex-direction: column;
      }

      .provider-action {
        padding-left: 62px;
      }
    }
  </style>
</head>
<body>
  <header class="container topbar">
    <a href="/" class="brand" aria-label="Shortly home">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.5 13.5l3-3"/>
          <path d="M7 17a4 4 0 010-5.66l2.34-2.34A4 4 0 0115 14.66L13.83 15.8"/>
          <path d="M17 7a4 4 0 010 5.66l-2.34 2.34A4 4 0 019 9.34l1.17-1.14"/>
        </svg>
      </span>
      <span>shortly</span>
    </a>
    <a href="/" class="back-link">На главную</a>
  </header>

  <main class="container auth-shell">
    <section class="auth-card" aria-label="Авторизация">
      <h1>Войти в shortly</h1>
      <p>Вход выполняется через отдельный Auth/OAuth Service. Если один провайдер временно недоступен, используйте другой.</p>
      <div class="provider-list" id="providerList"></div>
      <div class="status" id="statusText"></div>
    </section>
  </main>

  <script>
    const providerList = document.getElementById('providerList');
    const statusText = document.getElementById('statusText');

    function formatApiError(data) {
      if (!data || !data.detail) return 'Не удалось выполнить запрос.';
      return typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
    }

    async function api(path) {
      const response = await fetch(path, { credentials: 'same-origin' });
      const data = await response.json().catch(() => null);
      if (!response.ok) throw new Error(formatApiError(data));
      return data;
    }

    function applyAuthStatusFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const authError = params.get('auth_error');
      if (!authError) return;
      statusText.textContent = `Не удалось выполнить вход: ${decodeURIComponent(authError).replace(':', ' - ')}`;
      params.delete('auth_error');
      const nextQuery = params.toString();
      const nextUrl = `${window.location.pathname}${nextQuery ? `?${nextQuery}` : ''}${window.location.hash}`;
      window.history.replaceState({}, '', nextUrl);
    }

    async function loadProviders() {
      const providers = await api('/oauth/providers');
      const providerMarks = { yandex: 'Я', google: 'G', vk: 'VK' };
      const providerLabels = {
        yandex: 'Войти с Яндекс ID',
        google: 'Войти через Google',
        vk: 'Войти через VK ID',
      };
      providerList.innerHTML = '';
      providers.forEach((provider) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `provider-btn provider-${provider.id}`;
        button.disabled = !provider.available;
        button.innerHTML = `
          <div class="provider-main">
            <span class="provider-mark" aria-hidden="true">${providerMarks[provider.id] || '•'}</span>
            <div class="provider-copy">
              <strong>${providerLabels[provider.id] || provider.label}</strong>
              <small>${provider.available ? 'Перейдем на страницу провайдера и вернемся в shortly после входа.' : (provider.degraded_message || 'Провайдер временно недоступен.')}</small>
            </div>
          </div>
          <span class="provider-action">${provider.available ? 'Войти →' : 'Недоступно'}</span>
        `;
        button.addEventListener('click', () => {
          window.location.href = `/oauth/login/${provider.id}`;
        });
        providerList.appendChild(button);
      });
    }

    applyAuthStatusFromQuery();
    loadProviders().catch((error) => {
      statusText.textContent = error.message;
    });
  </script>
</body>
</html>
